<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Photography — Patrick Gaffney</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Photography — selected work and projects — by Patrick Gaffney.">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="wrap">
    <nav class="topnav">
      <a href="/">Home</a><span class="sep">·</span><a href="/music">Music</a><span class="sep">·</span><a href="/photography" aria-current="page">Photography</a>
    </nav>

    <h1>Photography</h1>
  </div>

  <div class="wrap-wide">
    <div class="gallery" id="selected" data-gallery="selected" aria-label="Selected work"></div>
  </div>

  <div class="wrap">
    <div id="project-groups" aria-label="Projects"></div>

    <h2><a href="/projects/portraits">Portraits</a></h2>

    <h2>Clients &amp; Press</h2>
    <p class="clients">Vogue &middot; Hollywood Beauty Awards &middot; Nuvonu</p>

    <footer class="foot">
      <p><em>All photographs &copy; Patrick Gaffney.</em></p>
    </footer>
  </div>

  <script src="js/lightbox.js"></script>
  <script>
  (function () {
    "use strict";
    function escape(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    // Category display order + labels. Add/rename here to change the layout.
    var CATEGORIES = [
      { key: "fashion-editorial", label: "Fashion & Editorial" },
      { key: "music",             label: "Music" },
      { key: "documentary",       label: "Documentary" },
      { key: "events",            label: "Events" }
    ];

    var selectedEl = document.getElementById("selected");
    var groupsEl = document.getElementById("project-groups");

    fetch("data/selected.json")
      .then(function (r) { return r.json(); })
      .then(function (data) {
        selectedEl.innerHTML = data.map(function (p, i) {
          return (
            '<figure>' +
              '<img class="lb" data-gallery="selected" data-index="' + i + '"' +
              ' src="' + escape(p.src) + '" alt="' + escape(p.caption) + '" loading="lazy">' +
              '<figcaption>' + escape(p.caption) + '</figcaption>' +
            '</figure>'
          );
        }).join("");
      })
      .catch(function (e) {
        selectedEl.innerHTML = '<p style="font-style:italic; color:#a01a1a;">Could not load selected.json (serve locally with <code>python3 -m http.server</code>).</p>';
        console.error(e);
      });

    function projectLi(p) {
      var yearHtml = p.year
        ? ' <span class="year">&middot; ' + escape(String(p.year)) + '</span>'
        : '';
      return (
        '<li>' +
          '<a class="title" href="' + escape(p.page) + '">' + escape(p.title) + '</a>' +
          yearHtml +
        '</li>'
      );
    }

    fetch("data/projects.json")
      .then(function (r) { return r.json(); })
      .then(function (data) {
        // Bucket by category
        var byCat = {};
        data.forEach(function (p) {
          var c = p.category || "uncategorized";
          (byCat[c] = byCat[c] || []).push(p);
        });
        // Sort within each bucket: explicit display_order asc (missing = last),
        // then year desc, then title asc.
        Object.keys(byCat).forEach(function (k) {
          byCat[k].sort(function (a, b) {
            var ao = a.display_order, bo = b.display_order;
            if (ao != null || bo != null) {
              if (ao == null) return 1;
              if (bo == null) return -1;
              if (ao !== bo) return ao - bo;
            }
            if ((b.year || 0) !== (a.year || 0)) return (b.year || 0) - (a.year || 0);
            return (a.title || "").localeCompare(b.title || "");
          });
        });
        // Render in fixed category order; skip empty
        var html = CATEGORIES.map(function (cat) {
          var items = byCat[cat.key] || [];
          if (!items.length) return "";
          return (
            '<h2>' + escape(cat.label) + '</h2>' +
            '<ul class="projects-list">' +
              items.map(projectLi).join("") +
            '</ul>'
          );
        }).join("");
        groupsEl.innerHTML = html || '<p style="font-style:italic; color:#666;">No projects yet.</p>';
      })
      .catch(function (e) {
        groupsEl.innerHTML = '<p style="font-style:italic; color:#a01a1a;">Could not load projects.json.</p>';
        console.error(e);
      });
  })();
  </script>
</body>
</html>
